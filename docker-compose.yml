services:

  backend:
    image: devops-backend
    container_name: devops-backend
    ports:
      - "5000:5000"
    restart: always


  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    restart: always
